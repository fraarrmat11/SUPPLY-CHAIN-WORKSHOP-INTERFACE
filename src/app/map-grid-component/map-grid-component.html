<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
</head>
<body>
  <h2>SUPPLY CHAIN SIMULATOR</h2>
  <div>
    <input type="number" [(ngModel)]="days" min="1">
    <button (click)="advanceDays()">ADVANCE DAYS</button>
  </div>

  <div class="gridMap">
    @for (cell of cells; track $index) {
      <div class="cell"
           [class.truck]="isTruck(cell.x, cell.y)"
           [class.warehouse]="isWarehouse(cell.x, cell.y)">
      </div>
    }
  </div>
  <div class="legend">
    <div class="cell truck"></div><p>TRUCK</p>
    <div class="cell warehouse"></div><p>WAREHOUSE</p>
  </div>
</body>
</html>
